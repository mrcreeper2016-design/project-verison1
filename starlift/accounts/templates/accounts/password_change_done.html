{% extends 'base.html' %}

{% block content %}
<div class="content-block animate-fade" style="max-width:560px; margin:0 auto; padding:28px; text-align:center;">
    <div style="width:64px; height:64px; border-radius:50%; background:var(--light-green); color:var(--sber-green); display:inline-flex; align-items:center; justify-content:center; font-size:28px; margin-bottom:16px;">
        <i class="fa-solid fa-circle-check"></i>
    </div>
    <h1 style="margin:0 0 8px; font-size:24px; font-weight:800;">Пароль обновлён</h1>
    <p style="color:var(--text-muted); margin:0 0 20px;">Новый пароль будет использован при следующем входе. Текущая сессия активна.</p>
    <a href="{% url 'accounts:profile' %}" class="btn-action btn-contact" style="text-decoration:none;">Вернуться в профиль</a>
</div>
{% endblock %}
