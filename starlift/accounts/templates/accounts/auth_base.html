{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StarLift{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolygon points='50,5 61,35 95,35 68,55 78,85 50,65 22,85 32,55 5,35 39,35' fill='%230A803B'/%3E%3Cpath d='M20,80 L55,45 L65,55 L90,20' fill='none' stroke='white' stroke-width='8' stroke-linecap='round'/%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        (function applyThemeBeforePaint() {
            try {
                const savedTheme = localStorage.getItem('theme');
                const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', savedTheme || (systemDark ? 'dark' : 'light'));
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <style>
        :root {
            --sber-green: #0A803B;
            --sber-green-hover: #08662A;
            --light-green: #DDF0E4;
            --bg-color: #E6F0EB;
            --white: rgba(230, 240, 235, 0.5);
            --text-main: #142C1E;
            --text-muted: #5B7565;
            --border-color: rgba(168, 204, 183, 0.6);
            --glass-bg: rgba(230, 240, 235, 0.4);
            --panel-bg: rgba(230, 240, 235, 0.85);
            --glass-border: rgba(168, 204, 183, 0.4);
            --mesh-1: #CDE8D7;
            --mesh-2: #C3E0CB;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --error-red: #D93E4E;
            --error-bg: rgba(217, 62, 78, 0.1);
        }

        [data-theme="dark"] {
            --sber-green: #21A038;
            --sber-green-hover: #2EBD49;
            --light-green: rgba(21, 46, 32, 0.6);
            --bg-color: #0E1512;
            --white: rgba(20, 29, 25, 0.5);
            --text-main: #E8E8E8;
            --text-muted: #A0A5AA;
            --border-color: rgba(42, 59, 50, 0.6);
            --glass-bg: rgba(30, 30, 30, 0.4);
            --panel-bg: rgba(20, 25, 22, 0.90);
            --glass-border: rgba(80, 80, 80, 0.4);
            --mesh-1: #0B1812;
            --mesh-2: #07120E;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow-x: hidden;
        }

        .mesh-gradient {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: linear-gradient(135deg, var(--mesh-1), var(--mesh-2));
        }

        .top-glow {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 300px;
            background: radial-gradient(ellipse at top, rgba(10, 128, 59, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        [data-theme="dark"] .top-glow {
            background: radial-gradient(ellipse at top, rgba(33, 160, 56, 0.25) 0%, transparent 70%);
        }

        .auth-card {
            width: 100%;
            max-width: 460px;
            background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px rgba(31, 38, 135, 0.12), inset 0 2px 2px rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 36px 36px 32px;
            z-index: 1;
            animation: fadeIn 0.5s ease;
        }

        [data-theme="dark"] .auth-card {
            background: linear-gradient(135deg, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.05) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), inset 0 2px 2px rgba(255, 255, 255, 0.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }
        .auth-logo-text { font-size: 22px; font-weight: 800; color: var(--sber-green); letter-spacing: 0.5px; }

        .auth-title {
            font-size: 26px;
            font-weight: 800;
            margin: 0 0 6px;
            letter-spacing: -0.02em;
        }
        .auth-subtitle {
            color: var(--text-muted);
            margin: 0 0 24px;
            font-size: 14px;
            line-height: 1.5;
        }

        .form-field { margin-bottom: 16px; }
        .form-field label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-muted);
        }
        .input-compact {
            width: 100%;
            background: var(--white);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }
        .input-compact:focus {
            border-color: var(--sber-green);
            box-shadow: 0 0 0 4px var(--light-green);
        }

        .field-errors {
            color: var(--error-red);
            font-size: 12px;
            margin-top: 4px;
        }
        .field-errors p { margin: 2px 0; }

        .alert {
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 16px;
            border: 1px solid transparent;
        }
        .alert-error {
            background: var(--error-bg);
            color: var(--error-red);
            border-color: rgba(217, 62, 78, 0.3);
        }
        .alert-info {
            background: var(--light-green);
            color: var(--sber-green);
            border-color: rgba(10, 128, 59, 0.25);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: var(--sber-green);
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 8px;
        }
        .btn-primary:hover {
            background: var(--sber-green-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(10, 128, 59, 0.3);
        }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .auth-links {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 16px;
            font-size: 13px;
        }
        .auth-links a {
            color: var(--sber-green);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-links a:hover { text-decoration: underline; }

        .auth-footer-note {
            margin-top: 22px;
            padding-top: 18px;
            border-top: 1px solid var(--border-color);
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.5;
        }

        .theme-toggle-floating {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: var(--sber-green);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: var(--transition);
        }
        [data-theme="dark"] .theme-toggle-floating {
            background: linear-gradient(135deg, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.05) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .theme-toggle-floating:hover { transform: translateY(-2px) scale(1.05); }
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <div class="mesh-gradient"></div>
    <div class="top-glow"></div>

    <button class="theme-toggle-floating" id="themeToggle" title="Переключить тему" type="button">
        <i class="fa-solid fa-moon"></i>
    </button>

    <div class="auth-card">
        <div class="auth-logo">
            <svg width="28" height="28" viewBox="0 0 100 100">
                <polygon points="50,5 61,35 95,35 68,55 78,85 50,65 22,85 32,55 5,35 39,35" fill="#0A803B"/>
                <path d="M20,80 L55,45 L65,55 L90,20" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
            </svg>
            <div class="auth-logo-text">STARLIFT</div>
        </div>
        {% block content %}{% endblock %}
    </div>

    <script>
        (function initThemeToggle() {
            const btn = document.getElementById('themeToggle');
            if (!btn) return;
            const icon = btn.querySelector('i');
            function apply(theme) {
                document.documentElement.setAttribute('data-theme', theme);
                try { localStorage.setItem('theme', theme); } catch (e) {}
                if (icon) {
                    icon.classList.toggle('fa-moon', theme !== 'dark');
                    icon.classList.toggle('fa-sun', theme === 'dark');
                }
            }
            const current = document.documentElement.getAttribute('data-theme') || 'light';
            apply(current);
            btn.addEventListener('click', () => {
                const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                apply(next);
            });
        })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
