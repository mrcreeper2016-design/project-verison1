{% extends 'base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'support/support.css' %}">

<div class="support-guest-wrap animate-fade">
    <div class="content-block">
        <h1><i class="fa-solid fa-life-ring" style="color:var(--sber-green);"></i> Связаться с поддержкой</h1>
        <p class="support-guest-lead">Заполните форму — пришлём ссылку на чат с поддержкой по указанному email.</p>

        <form method="post" class="support-guest-form">
            {% csrf_token %}
            {% if errors.rate %}<div class="su-new-form-error">{{ errors.rate }}</div>{% endif %}

            <label>Ваше имя
                <input type="text" name="name" value="{{ name|default:'' }}" maxlength="120">
            </label>
            <label>Email
                <input type="email" name="email" value="{{ email|default:'' }}" required>
                {% if errors.email %}<span class="support-field-error">{{ errors.email }}</span>{% endif %}
            </label>
            <label>Тема
                <input type="text" name="subject" value="{{ subject|default:'' }}" required maxlength="200">
                {% if errors.subject %}<span class="support-field-error">{{ errors.subject }}</span>{% endif %}
            </label>
            <label>Сообщение
                <textarea name="body" rows="6" required>{{ body|default:'' }}</textarea>
                {% if errors.body %}<span class="support-field-error">{{ errors.body }}</span>{% endif %}
            </label>

            <input type="text" name="website" class="su-honeypot" tabindex="-1" autocomplete="off">

            <button class="su-submit-btn" type="submit" style="align-self:flex-start;">
                <i class="fa-solid fa-paper-plane"></i> Отправить обращение
            </button>
        </form>
    </div>
</div>
{% endblock %}
