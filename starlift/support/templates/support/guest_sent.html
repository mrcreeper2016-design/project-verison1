{% extends 'base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'support/support.css' %}">

<div class="support-guest-wrap animate-fade">
    <div class="content-block" style="text-align:center;">
        <div class="chat-empty-icon" style="margin:0 auto 14px;"><i class="fa-solid fa-paper-plane"></i></div>
        <h1>Обращение отправлено</h1>
        <p>Мы отправили ссылку на чат с поддержкой на <strong>{{ email }}</strong>. Откройте письмо, чтобы продолжить.</p>
        {% if debug_link %}
        <p style="margin-top:18px;font-size:12px;color:var(--text-muted);">
            DEV: <a href="{{ debug_link }}">{{ debug_link }}</a>
        </p>
        {% endif %}
    </div>
</div>
{% endblock %}
