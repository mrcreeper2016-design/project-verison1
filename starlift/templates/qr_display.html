{% extends 'base.html' %}

{% block title %}Оцените выступление - {{ speaker.name }} | StarLift{% endblock %}

{% block content %}
<style>
    .qr-display-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 80vh;
        text-align: center;
    }

    .qr-card {
        background: var(--glass-bg);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        padding: clamp(20px, 5vw, 50px);
        max-width: 90vw;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: var(--transition);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        position: relative;
        overflow: hidden;
    }

    .qr-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 6px;
        background: linear-gradient(90deg, var(--sber-green), #42e67a);
    }

    .qr-title {
        font-size: clamp(1.6rem, 6vw, 2.8rem);
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-main);
        font-weight: 800;
        text-align: center;
    }

    .qr-subtitle {
        font-size: clamp(1.1rem, 4vw, 1.8rem);
        margin-top: 0;
        margin-bottom: clamp(16px, 4vw, 40px);
        color: var(--sber-green);
        font-weight: 600;
        text-align: center;
    }

    .qr-box {
        background-color: white;
        padding: 20px;
        border-radius: 16px;
        display: inline-block;
        border: 4px solid var(--border-color);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        transition: transform 0.3s ease;
    }

    .qr-box:hover {
        transform: scale(1.02);
    }

    .qr-img {
        width: min(85vw, 350px);
        height: auto;
        aspect-ratio: 1;
        object-fit: contain;
        display: block;
    }

    .qr-footer {
        margin-top: 30px;
        font-size: 1.4rem;
        color: var(--text-muted);
        line-height: 1.5;
        font-weight: 500;
    }
    
    .event-badge {
        display: inline-block;
        margin-top: 15px;
        padding: 8px 16px;
        background-color: var(--sber-green);
        color: white;
        border-radius: 50px;
        font-size: 1rem;
        font-weight: 600;
    }
</style>

<div class="qr-display-container">
    <div class="qr-card animate-fade">
        <h1 class="qr-title">Оцените выступление</h1>
        <h2 class="qr-subtitle">{{ speaker.name }}</h2>
        
        <div class="qr-box">
            <img src="data:image/png;base64,{{ qr_image_base64 }}" alt="QR Code" class="qr-img">
        </div>
        
        <div class="qr-footer">
            Наведите камеру смартфона, чтобы оставить отзыв
            <br>
            <span class="event-badge">{{ event.title }}</span>
        </div>

        <div class="qr-actions">
            <a href="{% url 'qr_poster' speaker_id=speaker.id event_id=event.id %}" class="btn-action btn-contact" download>
                <i class="fa-solid fa-download"></i> Скачать постер PNG
            </a>
            <button type="button" class="btn-action" id="qrPrintBtn">
                <i class="fa-solid fa-print"></i> Распечатать
            </button>
            <a href="{% url 'qr_generator' %}" class="btn-action">
                <i class="fa-solid fa-arrow-left"></i> Другой QR
            </a>
        </div>
    </div>
</div>

<style>
    .qr-actions {
        margin-top: 24px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
    }
    @media print {
        aside, .main-header, .qr-actions { display: none !important; }
        body, main { background: #fff !important; }
        .qr-card { box-shadow: none !important; border: none !important; }
    }
</style>

<script>
    (function() {
        const btn = document.getElementById('qrPrintBtn');
        if (btn) btn.addEventListener('click', () => window.print());
    })();
</script>
{% endblock %}
