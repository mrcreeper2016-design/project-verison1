{% extends 'base.html' %}
{% block content %}
<style>
    .events-page {
        display: grid;
        gap: 20px;
    }

    .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect( 0, 0, 0, 0 );
        white-space: nowrap;
        border: 0;
    }

    .events-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 16px;
        flex-wrap: wrap;
    }

    .events-title {
        margin: 0;
        font-size: clamp(28px, 3vw, 40px);
        font-weight: 800;
        letter-spacing: -0.04em;
        color: var(--text-main);
    }

    .events-subtitle {
        margin: 8px 0 0;
        color: var(--text-muted);
        font-size: 15px;
    }

    .events-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
    }

    .event-card-large {
        position: relative;
        padding: 20px;
        border-radius: 20px;
        border: 1px solid var(--border-color);
        background: var(--glass-bg);
        box-shadow: 0 8px 18px rgba(0,0,0,0.04);
        cursor: pointer;
        transition: var(--transition);
    }

    .event-card-large:active {
        transform: scale(0.98);
        backdrop-filter: blur(12px);
    }

    .event-card-large:hover {
        transform: translateY(-5px);
        box-shadow: 0 18px 30px rgba(10,128,59,0.08);
        border-color: rgba(10,128,59,0.2);
    }

    .event-card-large::after {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at top right, rgba(10,128,59,0.12), transparent 45%);
        opacity: 0;
        transition: var(--transition);
        pointer-events: none;
    }

    .event-card-large:hover::after {
        opacity: 1;
    }

    .event-card-large > * {
        position: relative;
        z-index: 1;
    }

    .event-card-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
        margin-bottom: 16px;
    }

    .event-date-box {
        display: inline-flex;
        flex-direction: column;
        gap: 3px;
    }

    .event-date-main {
        font-size: 18px;
        font-weight: 800;
        color: var(--text-main);
    }

    .event-date-sub {
        color: var(--text-muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-weight: 700;
    }

    .event-title-card {
        margin: 0 0 10px;
        font-size: 20px;
        line-height: 1.35;
        font-weight: 800;
        color: var(--text-main);
    }

    .event-description-card {
        margin: 0 0 18px;
        color: var(--text-muted);
        line-height: 1.6;
        font-size: 14px;
    }

    .stacked-avatars {
        display: flex;
        align-items: center;
    }

    .stacked-avatars .avatar {
        width: 40px;
        height: 40px;
        margin-left: -10px;
        border: 2px solid var(--panel-bg);
        box-shadow: 0 8px 16px rgba(0,0,0,0.08);
    }

    .stacked-avatars .avatar:first-child {
        margin-left: 0;
    }

    .event-card-bottom {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-top: 18px;
    }

    .speaker-count {
        font-size: 13px;
        color: var(--text-main);
        font-weight: 600;
    }

    .event-modal-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
        gap: 20px;
        margin-top: 8px;
    }

    .event-modal-section {
        padding: 18px;
        border-radius: 18px;
        border: 1px solid var(--border-color);
        background: var(--panel-bg);
        transition: var(--transition);
    }

    .event-modal-section:active {
        transform: scale(0.98);
        backdrop-filter: blur(12px);
    }

    .event-modal-title {
        margin: 0 0 12px;
        font-size: 24px;
        font-weight: 800;
        color: var(--text-main);
    }

    .schedule-list {
        display: grid;
        gap: 12px;
    }

    .schedule-item {
        display: grid;
        grid-template-columns: 74px 1fr;
        gap: 12px;
        align-items: start;
        padding: 12px;
        border-radius: 14px;
        background: var(--panel-bg);
        border: 1px solid var(--border-color);
        transition: var(--transition);
    }
    
    .schedule-item:active {
        transform: scale(0.98);
        backdrop-filter: blur(12px);
    }

    .schedule-time {
        font-size: 12px;
        font-weight: 800;
        color: var(--sber-green);
        text-transform: uppercase;
        letter-spacing: 0.06em;
    }

    .schedule-text {
        font-size: 14px;
        color: var(--text-main);
        line-height: 1.5;
    }

    .speaker-chip {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 14px;
        background: var(--panel-bg);
        border: 1px solid var(--border-color);
        transition: var(--transition);
    }

    .speaker-chip:active {
        transform: scale(0.98);
        backdrop-filter: blur(12px);
    }

    .speaker-chip .avatar {
        width: 34px;
        height: 34px;
    }

    .speaker-chip strong {
        display: block;
        font-size: 14px;
        color: var(--text-main);
    }

    .speaker-chip span {
        display: block;
        font-size: 12px;
        color: var(--text-muted);
    }

    .section-title {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        color: var(--text-main);
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .events-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        align-items: center;
        padding: 16px 18px;
        border-radius: 18px;
        border: 1px solid var(--border-color);
        background: var(--glass-bg);
    }

    .events-search-wrap {
        flex: 1;
        min-width: 220px;
    }

    .events-search {
        width: 100%;
        box-sizing: border-box;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--border-color);
        background: var(--panel-bg);
        color: var(--text-main);
        font-size: 15px;
        font-family: inherit;
        transition: var(--transition);
    }

    .events-search:focus {
        outline: none;
        border-color: rgba(10, 128, 59, 0.45);
        box-shadow: 0 0 0 3px rgba(10, 128, 59, 0.12);
    }

    .events-search::placeholder {
        color: var(--text-muted);
    }

    .events-filters {
        display: flex;
        flex-wrap: wrap;
        gap: 18px;
        align-items: center;
    }

    .filter-toggle {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        color: var(--text-main);
        cursor: pointer;
        user-select: none;
        font-weight: 500;
    }

    .filter-toggle .sl-checkbox {
        margin-top: 1px;
    }

    .event-speakers-block {
        margin: 0 0 14px;
        display: grid;
        gap: 8px;
    }

    .event-speakers-block .stacked-avatars {
        flex-wrap: wrap;
    }

    .event-speakers-names {
        margin: 0;
        font-size: 13px;
        line-height: 1.45;
        color: var(--text-muted);
        font-weight: 500;
    }

    .event-speaker-link {
        color: var(--sber-green);
        font-weight: 600;
        text-decoration: none;
    }

    .event-speaker-link:hover {
        text-decoration: underline;
    }

    .event-speaker-sep {
        color: var(--text-muted);
        font-weight: 500;
    }

    .events-empty {
        grid-column: 1 / -1;
        text-align: center;
        padding: 40px 20px;
        color: var(--text-muted);
        font-size: 15px;
    }

    .events-sort-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
    }

    .events-sort-wrap label {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
        white-space: nowrap;
    }

    .events-sort {
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border-color);
        background: var(--panel-bg);
        color: var(--text-main);
        font-size: 14px;
        font-family: inherit;
        min-width: 220px;
        cursor: pointer;
    }

    .events-sort:focus {
        outline: none;
        border-color: rgba(10, 128, 59, 0.45);
    }

    #eventModalOverlay.modal-overlay {
        align-items: flex-start;
        padding: 24px 12px;
        overflow-y: auto;
    }

    #eventModalOverlay .modal-content.event-detail-modal {
        width: min(1120px, calc(100vw - 24px));
        max-width: none;
        max-height: none;
        margin: auto;
        padding: 28px 32px 32px;
        box-sizing: border-box;
        overflow: visible;
    }

    .event-detail-modal .event-modal-grid {
        grid-template-columns: minmax(280px, 1fr) minmax(320px, 1fr);
        align-items: start;
    }

    .event-modal-scroll-col {
        min-height: 0;
        max-height: min(72vh, 900px);
        overflow-y: auto;
        padding-right: 6px;
        scrollbar-gutter: stable;
    }

    .event-desc-wrap {
        margin-top: 4px;
    }

    .event-desc-body {
        margin: 0;
        font-size: 14px;
        line-height: 1.55;
        color: var(--text-muted);
        white-space: pre-wrap;
        word-break: break-word;
        overflow-wrap: anywhere;
    }

    .event-desc-body.is-collapsed {
        max-height: 7.2rem;
        overflow: hidden;
        position: relative;
    }

    .event-desc-body.is-collapsed::after {
        content: '';
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 2.25rem;
        background: linear-gradient(to bottom, transparent, var(--panel-bg));
        pointer-events: none;
    }

    .event-desc-toggle {
        margin-top: 10px;
        padding: 0;
        border: none;
        background: none;
        color: var(--sber-green);
        font-size: 14px;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        display: none;
        align-items: center;
        gap: 6px;
    }

    .event-desc-toggle:hover {
        text-decoration: underline;
    }

    .event-desc-toggle.is-visible {
        display: inline-flex;
    }

    .event-schedule-scroll {
        max-height: min(38vh, 360px);
        overflow-y: auto;
        padding-right: 4px;
        word-break: break-word;
    }

    @media (max-width: 960px) {
        .events-grid,
        .event-modal-grid {
            grid-template-columns: 1fr;
        }

        #eventModalOverlay .modal-content.event-detail-modal {
            width: calc(100vw - 16px);
            padding: 22px 18px;
        }

        .event-modal-scroll-col {
            max-height: none;
            overflow: visible;
            padding-right: 0;
        }

        .event-schedule-scroll {
            max-height: 42vh;
        }
    }
</style>

<div class="events-page">
    <div class="events-header animate-fade">
        <div>
            <h1 class="events-title">Мероприятия</h1>
            <p class="events-subtitle">Карточки ближайших и прошедших событий с подробным просмотром</p>
        </div>
        <span class="badge-active" id="activeEventsBadge"><i class="fa-solid fa-calendar-days"></i> Загрузка...</span>
    </div>

    <div class="events-toolbar animate-fade" style="margin-top:4px;">
        <div class="events-search-wrap">
            <label class="visually-hidden" for="eventsSearch">Поиск мероприятий</label>
            <input type="search" class="events-search" id="eventsSearch" placeholder="Поиск по названию, месту, описанию, спикерам…" autocomplete="off">
        </div>
        <div class="events-filters">
            <label class="filter-toggle">
                <input type="checkbox" id="filterSoon" class="sl-checkbox">
                <span>В ближайшие 30 дней</span>
            </label>
            <label class="filter-toggle">
                <input type="checkbox" id="filterHidePast" class="sl-checkbox">
                <span>Скрыть прошедшие</span>
            </label>
        </div>
        <div class="events-sort-wrap">
            <label for="eventsSort">Сортировка</label>
            <select class="events-sort" id="eventsSort" aria-label="Сортировка списка">
                <option value="date_asc" selected>Дата: сначала ближайшие</option>
                <option value="date_desc">Дата: сначала поздние</option>
                <option value="title_asc">Название А → Я</option>
                <option value="title_desc">Название Я → А</option>
            </select>
        </div>
    </div>

    <div class="events-grid" id="eventsContainer">
    <!-- Данные будут загружены динамически -->
</div>
</div>

<script>
(function() {
'use strict';
let eventsDataCache = {};
let allEvents = [];
const SOON_DAYS = 30;

const RU_MONTHS_GEN = {
    'января': 0, 'февраля': 1, 'марта': 2, 'апреля': 3, 'мая': 4, 'июня': 5,
    'июля': 6, 'августа': 7, 'сентября': 8, 'октября': 9, 'ноября': 10, 'декабря': 11
};

const RU_MONTHS_NOM = {
    'январь': 0, 'февраль': 1, 'март': 2, 'апрель': 3, 'май': 4, 'июнь': 5,
    'июль': 6, 'август': 7, 'сентябрь': 8, 'октябрь': 9, 'ноябрь': 10, 'декабрь': 11
};

function monthIndexRu(word) {
    const w = word.toLowerCase();
    if (RU_MONTHS_GEN[w] !== undefined) return RU_MONTHS_GEN[w];
    if (RU_MONTHS_NOM[w] !== undefined) return RU_MONTHS_NOM[w];
    return undefined;
}

function pushDateCandidate(arr, y, mo0, d) {
    if (y < 1990 || y > 2100 || mo0 < 0 || mo0 > 11 || d < 1 || d > 31) return;
    const t = new Date(y, mo0, d).getTime();
    if (!Number.isNaN(t)) arr.push(t);
}

function inferYearForMonthDayMo0(mo0, day) {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const y = today.getFullYear();
    let cand = new Date(y, mo0, day);
    if (cand < today) {
        cand = new Date(y + 1, mo0, day);
    }
    return cand.getFullYear();
}

function parseLooseDateString(raw) {
    if (raw === null || raw === undefined) return null;
    const s = String(raw).trim();
    if (!s || s.toLowerCase() === 'none') return null;
    const candidates = [];
    let m;

    const reDmY = /\b(\d{1,2})\.(\d{1,2})\.(\d{4})\b/g;
    while ((m = reDmY.exec(s)) !== null) {
        const d = parseInt(m[1], 10);
        const mo = parseInt(m[2], 10) - 1;
        const y = parseInt(m[3], 10);
        pushDateCandidate(candidates, y, mo, d);
    }

    const reIso = /\b(\d{4})-(\d{2})-(\d{2})\b/g;
    while ((m = reIso.exec(s)) !== null) {
        const y = parseInt(m[1], 10);
        const mo = parseInt(m[2], 10) - 1;
        const d = parseInt(m[3], 10);
        pushDateCandidate(candidates, y, mo, d);
    }

    const reRangeRu = /\b(\d{1,2})\s*[–—-]\s*(\d{1,2})\s+([а-яё]+)\s+(\d{4})\b/giu;
    while ((m = reRangeRu.exec(s)) !== null) {
        const d1 = parseInt(m[1], 10);
        const mon = monthIndexRu(m[3]);
        const y = parseInt(m[4], 10);
        if (mon !== undefined) pushDateCandidate(candidates, y, mon, d1);
    }

    const reRuDMY = /\b(\d{1,2})\s+([а-яё]+)\s+(\d{4})\b/giu;
    while ((m = reRuDMY.exec(s)) !== null) {
        const d = parseInt(m[1], 10);
        const mon = monthIndexRu(m[2]);
        const y = parseInt(m[3], 10);
        if (mon !== undefined) pushDateCandidate(candidates, y, mon, d);
    }

    if (!candidates.length) {
        const reDayMonNoYear = /\b(\d{1,2})\s+([а-яё]+)\b/giu;
        while ((m = reDayMonNoYear.exec(s)) !== null) {
            const after = s.slice(m.index + m[0].length);
            if (/^\s*\d{4}\b/.test(after)) continue;
            const d = parseInt(m[1], 10);
            const mon = monthIndexRu(m[2]);
            if (mon === undefined) continue;
            const y = inferYearForMonthDayMo0(mon, d);
            pushDateCandidate(candidates, y, mon, d);
        }
    }

    if (!candidates.length) {
        const reMyOnly = /\b([а-яё]+)\s+(\d{4})\b/giu;
        while ((m = reMyOnly.exec(s)) !== null) {
            const mon = monthIndexRu(m[1]);
            const y = parseInt(m[2], 10);
            if (mon !== undefined) pushDateCandidate(candidates, y, mon, 1);
        }
    }

    if (!candidates.length) return null;
    return new Date(Math.min(...candidates));
}

function parseEventDate(ev) {
    if (ev.sort_date) {
        const p = parseLocalDate(ev.sort_date);
        if (p) return p;
    }
    let d = parseLooseDateString(ev.date);
    if (d) return d;
    d = parseLocalDate(ev.event_date);
    if (d) return d;
    d = parseLooseDateString(ev.title || '');
    if (d) return d;
    return parseLooseDateString((ev.description || '').slice(0, 800));
}

function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

function parseLocalDate(iso) {
    if (!iso) return null;
    const head = String(iso).trim().slice(0, 10);
    const parts = head.split('-');
    if (parts.length < 3) return null;
    const y = parseInt(parts[0], 10);
    const m = parseInt(parts[1], 10) - 1;
    const d = parseInt(parts[2], 10);
    if (Number.isNaN(y) || Number.isNaN(m) || Number.isNaN(d)) return null;
    return new Date(y, m, d);
}

function isEventPast(ev) {
    if (ev.status === 'past') return true;
    const dt = parseEventDate(ev);
    if (!dt) return false;
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    return dt < today;
}

function isSoon(ev) {
    if (isEventPast(ev)) return false;
    const dt = parseEventDate(ev);
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const limit = new Date(today);
    limit.setDate(limit.getDate() + SOON_DAYS);
    if (!dt) {
        return false;
    }
    return dt >= today && dt <= limit;
}

function matchesSearch(ev, q) {
    if (!q) return true;
    const s = q.toLowerCase();
    const speakerBits = (ev.speakers || []).flatMap(sp => [sp.name, sp.sub]);
    const hay = [
        ev.title,
        ev.description,
        ev.location,
        ev.date,
        ...speakerBits
    ].filter(Boolean).join(' ').toLowerCase();
    return hay.includes(s);
}

function getFilteredEvents() {
    const q = (document.getElementById('eventsSearch')?.value || '').trim();
    const hidePast = document.getElementById('filterHidePast')?.checked;
    const soonOnly = document.getElementById('filterSoon')?.checked;
    return allEvents.filter(ev => {
        if (hidePast && isEventPast(ev)) return false;
        if (soonOnly && !isSoon(ev)) return false;
        if (!matchesSearch(ev, q)) return false;
        return true;
    });
}

function sortEventsList(list) {
    const mode = document.getElementById('eventsSort')?.value || 'date_asc';
    const out = [...list];
    const tInfinity = 4102444800000;
    const timeKey = ev => {
        if (ev.sort_date) {
            const p = parseLocalDate(ev.sort_date);
            if (p) return p.getTime();
        }
        const d = parseEventDate(ev);
        if (d) return d.getTime();
        return isEventPast(ev) ? 0 : tInfinity;
    };
    const pastKey = ev => (isEventPast(ev) ? 1 : 0);

    if (mode === 'title_asc') {
        out.sort((a, b) => String(a.title).localeCompare(String(b.title), 'ru'));
        return out;
    }
    if (mode === 'title_desc') {
        out.sort((a, b) => String(b.title).localeCompare(String(a.title), 'ru'));
        return out;
    }
    if (mode === 'date_desc') {
        out.sort((a, b) => {
            const pb = pastKey(a) - pastKey(b);
            if (pb) return pb;
            const td = timeKey(b) - timeKey(a);
            if (td) return td;
            return String(a.title).localeCompare(String(b.title), 'ru');
        });
        return out;
    }
    out.sort((a, b) => {
        const pb = pastKey(a) - pastKey(b);
        if (pb) return pb;
        const td = timeKey(a) - timeKey(b);
        if (td) return td;
        return String(a.title).localeCompare(String(b.title), 'ru');
    });
    return out;
}

function buildCardSpeakersHtml(ev) {
    const speakers = ev.speakers || [];
    if (!speakers.length) {
        return '<p class="event-speakers-names" style="margin-bottom:0;">Спикеры не указаны</p>';
    }
    const maxA = 4;
    const shown = speakers.slice(0, maxA);
    const avatars = shown.map(sp => {
        const alt = escapeHtml(sp.name);
        if (sp.avatar) {
            return `<img class="avatar" src="${escapeHtml(sp.avatar)}" alt="${alt}">`;
        }
        const letter = escapeHtml((sp.name || '?').trim().charAt(0) || '?');
        return `<div class="avatar" style="background:var(--sber-green);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;" aria-hidden="true">${letter}</div>`;
    }).join('');
    const more = speakers.length > maxA
        ? `<span class="speaker-count" style="margin-left:6px;">+${speakers.length - maxA}</span>`
        : '';
    const names = speakers.map((s, idx) => {
        const sep = idx ? '<span class="event-speaker-sep"> · </span>' : '';
        return `${sep}<a href="/speakers/#open-speaker-${s.id}" class="event-speaker-link">${escapeHtml(s.name)}</a>`;
    }).join('');
    return `
        <div class="event-speakers-block">
            <div class="stacked-avatars" style="display:flex;align-items:center;">${avatars}${more}</div>
            <p class="event-speakers-names">${names}</p>
        </div>
    `;
}

function updateActiveBadge() {
    const activeBadge = document.getElementById('activeEventsBadge');
    if (!activeBadge) return;
    const activeCount = allEvents.filter(ev => !isEventPast(ev)).length;
    let noun = 'мероприятий';
    if (activeCount % 10 === 1 && activeCount % 100 !== 11) {
        noun = 'мероприятие';
    } else if ([2, 3, 4].includes(activeCount % 10) && ![12, 13, 14].includes(activeCount % 100)) {
        noun = 'мероприятия';
    }
    activeBadge.innerHTML = `<i class="fa-solid fa-calendar-days"></i> ${activeCount} предстоящих ${noun}`;
}

function renderEvents() {
    const container = document.getElementById('eventsContainer');
    if (!container) return;

    container.innerHTML = '';

    allEvents.forEach(ev => {
        eventsDataCache[ev.id] = ev;
    });

    const filtered = sortEventsList(getFilteredEvents());

    if (!filtered.length) {
        container.innerHTML = '<p class="events-empty">Нет мероприятий по выбранным условиям. Измените поиск или снимите фильтры.</p>';
        return;
    }

    filtered.forEach(ev => {

        const past = isEventPast(ev);
        const statusClass = past ? 'badge-inactive' : 'badge-active';
        const statusText = past ? 'Прошедшие' : 'Предстоящее';

        const card = document.createElement('article');
        card.className = 'event-card-large';
        card.dataset.eventId = ev.id;

        let cardLink = '';
        if (ev.link && ev.link !== 'None' && ev.link !== '') {
            cardLink = `<a href="${escapeHtml(ev.link)}" target="_blank" rel="noopener noreferrer" class="event-card-external-link" style="color: var(--sber-green); font-weight: 600; text-decoration: none;">Перейти на сайт</a>`;
        }

        let desc = ev.description && ev.description !== 'None' ? ev.description : '';
        if (desc.length > 120) desc = desc.substring(0, 120) + '…';

        card.innerHTML = `
            <div class="event-card-top">
                <div class="event-date-box">
                    <span class="event-date-main">${ev.date && ev.date !== 'None' ? escapeHtml(ev.date) : 'Дата не указана'}</span>
                    <span class="event-date-sub">${ev.location && ev.location !== 'None' ? escapeHtml(ev.location) : 'Онлайн'}</span>
                </div>
                <span class="${statusClass}">${statusText}</span>
            </div>
            <h2 class="event-title-card" style="margin-top: 10px;">${escapeHtml(ev.title)}</h2>
            <p class="event-description-card">${escapeHtml(desc)}</p>
            ${buildCardSpeakersHtml(ev)}
            <div class="event-card-bottom" style="margin-top:auto;">
                ${cardLink}
            </div>
        `;

        const ext = card.querySelector('.event-card-external-link');
        if (ext) {
            ext.addEventListener('click', e => e.stopPropagation());
        }
        card.querySelectorAll('.event-speaker-link').forEach(a => {
            a.addEventListener('click', e => e.stopPropagation());
        });

        card.addEventListener('click', () => openEventModal(ev.id));
        container.appendChild(card);
    });
}

async function fetchEvents() {
    try {
        const response = await fetch('/api/events/');
        const events = await response.json();
        allEvents = Array.isArray(events) ? events : [];
        updateActiveBadge();
        renderEvents();
        tryOpenEventFromHash();
    } catch (err) {
        console.error('Error fetching events:', err);
    }
}

function tryOpenEventFromHash() {
    const m = (location.hash || '').match(/^#event-(\d+)$/);
    if (!m) return;
    const id = Number(m[1]);
    if (!Number.isFinite(id) || !eventsDataCache[id]) return;
    openEventModal(id);
}

if (window.__starliftEventsHashHandler) {
    window.removeEventListener('hashchange', window.__starliftEventsHashHandler);
}
window.__starliftEventsHashHandler = function() {
    if (document.getElementById('eventsContainer')) {
        tryOpenEventFromHash();
    }
};
window.addEventListener('hashchange', window.__starliftEventsHashHandler);

function renderEventModal(eventId) {
    const ev = eventsDataCache[eventId];
    if (!ev) return;

    const past = isEventPast(ev);
    const statusClass = past ? 'badge-inactive' : 'badge-active';
    const statusText = past ? 'Прошедшие' : 'Предстоящее';

    const badge = document.getElementById('eventStatusBadge');
    if (badge) {
        badge.className = statusClass;
        badge.textContent = statusText;
    }

    document.getElementById('eventModalTitle').textContent = ev.title;

    const descEl = document.getElementById('eventModalDescription');
    const descToggle = document.getElementById('eventModalDescToggle');
    const rawDesc = ev.description && ev.description !== 'None' ? String(ev.description) : '';
    if (descEl) {
        descEl.textContent = rawDesc || 'Описание отсутствует';
        const needsToggle = rawDesc.length > 280 || (rawDesc.match(/\n/g) || []).length > 4;
        descEl.classList.toggle('is-collapsed', needsToggle);
        if (descToggle) {
            if (needsToggle) {
                descToggle.classList.add('is-visible');
                descToggle.setAttribute('aria-expanded', 'false');
                descToggle.textContent = 'Показать полностью';
                descToggle.onclick = () => {
                    descEl.classList.toggle('is-collapsed');
                    const collapsed = descEl.classList.contains('is-collapsed');
                    descToggle.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
                    descToggle.textContent = collapsed ? 'Показать полностью' : 'Свернуть';
                };
            } else {
                descToggle.classList.remove('is-visible');
                descToggle.removeAttribute('aria-expanded');
                descToggle.textContent = '';
                descToggle.onclick = null;
            }
        }
    }

    const coverAvatar = document.getElementById('eventCoverAvatar');
    if (coverAvatar) coverAvatar.style.display = 'none';

    document.getElementById('eventLocationLine').textContent = ev.location && ev.location !== 'None' ? ev.location : 'Онлайн/Офлайн';
    document.getElementById('eventCountLine').textContent = ev.date && ev.date !== 'None' ? ev.date : 'Дата уточняется';

    let formatHtml = 'Информация недоступна';
    if (ev.link && ev.link !== 'None') {
        formatHtml = `<a href="${escapeHtml(ev.link)}" target="_blank" rel="noopener noreferrer">Перейти по ссылке</a>`;
    }
    document.getElementById('eventFormatLine').innerHTML = formatHtml;

    const spWrap = document.getElementById('eventSpeakersList');
    const spList = ev.speakers || [];
    if (spWrap) {
        if (!spList.length) {
            spWrap.innerHTML = '<p style="color:var(--text-muted);font-size:14px;">Спикеры для этого мероприятия не указаны.</p>';
        } else {
            spWrap.innerHTML = spList.map(sp => {
                const sub = sp.sub ? escapeHtml(sp.sub) : '';
                const alt = escapeHtml(sp.name || '');
                const href = `/speakers/#open-speaker-${sp.id}`;
                const img = sp.avatar
                    ? `<img class="avatar" src="${escapeHtml(sp.avatar)}" alt="${alt}">`
                    : `<div class="avatar" style="background:var(--sber-green);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;" aria-hidden="true">${escapeHtml((sp.name || '?').charAt(0))}</div>`;
                return `<div class="speaker-chip">${img}<div><strong><a href="${href}" class="event-speaker-link">${escapeHtml(sp.name)}</a></strong><span>${sub}</span></div></div>`;
            }).join('');
            spWrap.querySelectorAll('a.event-speaker-link').forEach(a => {
                a.addEventListener('click', e => e.stopPropagation());
            });
        }
    }

    const schedEl = document.getElementById('eventScheduleList');
    let scheduleHtml = '<p style="color:var(--text-muted);font-size:14px;margin:0;">Смотрите подробное расписание на официальном сайте мероприятия.</p>';
    if (ev.schedule && ev.schedule !== 'None' && String(ev.schedule).trim() !== '') {
        scheduleHtml = ev.schedule;
    }
    if (schedEl) {
        schedEl.innerHTML = scheduleHtml;
        schedEl.classList.add('event-schedule-scroll');
    }
}

function openEventModal(eventId) {
    renderEventModal(eventId);
    const overlay = document.getElementById('eventModalOverlay');
    if (overlay) overlay.style.display = 'flex';
}

function bindEventsFilters() {
    const toolbar = document.querySelector('.events-toolbar');
    if (!toolbar || toolbar.dataset.eventsFiltersBound === '1') {
        return;
    }
    toolbar.dataset.eventsFiltersBound = '1';
    const search = document.getElementById('eventsSearch');
    const soon = document.getElementById('filterSoon');
    const hidePast = document.getElementById('filterHidePast');
    const sortSel = document.getElementById('eventsSort');
    const rerender = () => renderEvents();
    if (search) search.addEventListener('input', rerender);
    if (soon) soon.addEventListener('change', rerender);
    if (hidePast) hidePast.addEventListener('change', rerender);
    if (sortSel) sortSel.addEventListener('change', rerender);
}

bindEventsFilters();
fetchEvents();
})();
</script>
{% endblock %}
